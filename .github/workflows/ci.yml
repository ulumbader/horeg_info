name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: "true"
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/sound_horeg_ci?schema=public
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/sound_horeg_ci?schema=public
      BETTER_AUTH_SECRET: ci-only-secret-that-is-at-least-thirty-two-characters
      ANONYMOUS_ID_SECRET: ci-only-anonymous-secret-at-least-thirty-two-characters
      BETTER_AUTH_URL: http://localhost:3000
      TRUSTED_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_MAP_TILE_URL: https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
      NEXT_PUBLIC_MAP_ATTRIBUTION: OpenStreetMap contributors

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

      - name: Production build
        run: npm run build
